<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, follow" />
  <title>Page Not Found | The Style Workshop</title>
  <style>
    :root { --ink: #2b2b28; --muted: #6f6a62; --line: #e3ddd3; --bg: #f6f2ec; --accent: #2b2b28; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--ink);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 2rem; text-align: center;
    }
    .wrap { max-width: 540px; }
    .eyebrow { letter-spacing: 0.28em; text-transform: uppercase; font-size: 0.72rem; color: var(--muted); margin-bottom: 1.75rem; }
    h1 { font-size: clamp(3.5rem, 12vw, 6rem); font-weight: 300; letter-spacing: 0.02em; margin: 0 0 0.5rem; }
    h2 { font-size: 1.4rem; font-weight: 400; margin: 0 0 1rem; }
    p { color: var(--muted); line-height: 1.7; margin: 0 auto 2.25rem; max-width: 26rem; }
    .divider { width: 48px; height: 1px; background: var(--line); margin: 0 auto 2rem; }
    a.btn {
      display: inline-block; text-decoration: none; color: var(--bg); background: var(--accent);
      padding: 0.9rem 2.1rem; letter-spacing: 0.18em; text-transform: uppercase; font-size: 0.72rem;
      transition: opacity 0.2s ease;
    }
    a.btn:hover { opacity: 0.82; }
    .links { margin-top: 1.75rem; font-size: 0.85rem; }
    .links a { color: var(--muted); text-decoration: none; margin: 0 0.6rem; border-bottom: 1px solid var(--line); padding-bottom: 2px; }
    .links a:hover { color: var(--ink); }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="eyebrow">The Style Workshop</div>
    <h1>404</h1>
    <h2>This page has moved on</h2>
    <div class="divider"></div>
    <p>The page you were looking for can&rsquo;t be found. It may have been moved or no longer exists &mdash; but there&rsquo;s plenty more to explore.</p>
    <a class="btn" href="/">Return Home</a>
    <div class="links">
      <a href="/#packages">Services</a>
      <a href="/#projects">Projects</a>
      <a href="/blog/">Journal</a>
      <a href="/#contact">Contact</a>
    </div>
  </main>
</body>
</html>
