name: IndexNow — Notify Search Engines

# Triggers when Vercel marks a deployment as successful.
# This fires automatically on every push to main once Vercel finishes deploying.
on:
  deployment_status:

jobs:
  ping:
    name: Ping IndexNow
    # Only run when the deployment succeeded (not on 'pending' or 'failure')
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Submit URLs to IndexNow
        run: |
          python3 << 'PYEOF'
          import subprocess, json, re, sys

          INDEXNOW_KEY = "043f1d2ca414247a4b118831603fb4cc"
          HOST = "www.thestyleworkshop.com.au"

          # Read all URLs from sitemap
          with open("sitemap.xml") as f:
              content = f.read()
          urls = re.findall(r"<loc>([^<]+)</loc>", content)

          if not urls:
              print("No URLs found in sitemap — skipping.")
              sys.exit(0)

          print(f"Submitting {len(urls)} URLs to IndexNow:")
          for u in urls:
              print(f"  {u}")

          payload = json.dumps({
              "host": HOST,
              "key": INDEXNOW_KEY,
              "keyLocation": f"https://{HOST}/{INDEXNOW_KEY}.txt",
              "urlList": urls
          })

          result = subprocess.run(
              [
                  "curl", "-s", "-w", "\nHTTP Status: %{http_code}",
                  "-X", "POST", "https://api.indexnow.org/indexnow",
                  "-H", "Content-Type: application/json; charset=utf-8",
                  "-d", payload
              ],
              capture_output=True, text=True
          )
          print(result.stdout)
          if result.returncode != 0:
              print(result.stderr)
              sys.exit(1)
          PYEOF
